<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reप</title>
<style>
  .container {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    height: 100vh;
    margin: 0;
    padding: 20px;
    gap: 40px; /* Left box and right controls के बीच space */
  }

  .real-size-box {
    width: 81.2mm;
    height: 178mm;
    border: 1px solid red;
    box-sizing: border-box;
    background-color: #f8f8f8;
    overflow: hidden; /* Overflow को रोकने के लिए */
    position: relative;
  }

  .iphone-box {
    width: 71.6mm;
    height: 147.6mm;
    border: 1px solid blue;
    box-sizing: border-box;
    background-color: #f8f8f8;
    overflow: hidden; /* Overflow को रोकने के लिए */
    position: relative;
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  input[type="text"] {
    width: 300px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 10px;
  }

  iframe {
    border: none;
    transform-origin: top left;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="real-size-box">
      <iframe id="previewFrame" src="about:blank"></iframe>
    </div>
    <div class="controls">
      <h2>URL Search Box</h2>
      <input type="text" id="urlInput" placeholder="Enter website URL here (e.g., https://example.com or http://example.com)" />
      <button onclick="loadURL()">Load in Frame</button>
      <button onclick="openNewWindow()">Open in New Window</button>
    </div>
    <div class="iphone-box">
      <iframe id="iphoneFrame" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    function loadURL() {
      let url = document.getElementById('urlInput').value.trim();
      if (url) {
        // अगर URL में http:// या https:// नहीं है, तो https:// जोड़ दो (default secure)
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }
        document.getElementById('previewFrame').src = url;
        document.getElementById('iphoneFrame').src = url;
        adjustRedmiScale(); // Adjust after loading
        adjustIphoneScale();
      } else {
        alert('Please enter a valid URL');
      }
    }

    function openNewWindow() {
      let url = document.getElementById('urlInput').value.trim();
      if (url) {
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }
        window.open(url, '_blank');
      } else {
        alert('Please enter a valid URL');
      }
    }

    function adjustRedmiScale() {
      const mobileWidth = 375; // Typical mobile logical width (e.g., iPhone)
      const mobileHeight = 812; // Typical mobile logical height
      const box = document.querySelector('.real-size-box');
      const boxWidth = box.clientWidth;
      const boxHeight = box.clientHeight;
      const scaleX = boxWidth / mobileWidth;
      const scaleY = boxHeight / mobileHeight;
      const scale = Math.min(scaleX, scaleY);
      const iframe = document.getElementById('previewFrame');
      iframe.style.width = `${mobileWidth}px`;
      iframe.style.height = `${mobileHeight}px`;
      iframe.style.transform = `scale(${scale})`;
    }

    function adjustIphoneScale() {
      const mobileWidth = 393; // iPhone 16 logical width
      const mobileHeight = 852; // iPhone 16 logical height
      const box = document.querySelector('.iphone-box');
      const boxWidth = box.clientWidth;
      const boxHeight = box.clientHeight;
      const scaleX = boxWidth / mobileWidth;
      const scaleY = boxHeight / mobileHeight;
      const scale = Math.min(scaleX, scaleY);
      const iframe = document.getElementById('iphoneFrame');
      iframe.style.width = `${mobileWidth}px`;
      iframe.style.height = `${mobileHeight}px`;
      iframe.style.transform = `scale(${scale})`;
    }

    // Initial adjust
    adjustRedmiScale();
    adjustIphoneScale();

    // Adjust on resize (e.g., zoom changes)
    window.addEventListener('resize', () => {
      adjustRedmiScale();
      adjustIphoneScale();
    });
  </script>
</body>
</html>
